<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anna Bessonova</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FAF9F5;
    --text: #212120;
    --text-muted: #535352;
    --blue: #063C8C;
    --red: #E22015;
    --green: #6C9859;
    --shadow: rgba(0,0,0,0.15);
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    line-height: 1.3;
    letter-spacing: 0;
    overflow-x: hidden;
  }

  .page {
    min-height: 100vh;
    padding: 64px 120px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: auto auto auto;
    gap: 0 0;
    align-items: start;
  }

  /* АВАТАР: col 1, row 1–2 */
  .profile {
    grid-column: 1;
    grid-row: 1 / 3;
    opacity: 0;
    animation: fadeIn 0.5s ease 0.05s forwards;
  }

  .avatar {
    width: 80px; height: 80px;
    border-radius: 50%; overflow: hidden;
    margin-bottom: 20px;
    border: 2px solid rgba(0,0,0,0.08);
  }

  .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .avatar-placeholder {
    width: 100%; height: 100%;
    background: #c8c0b0;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700; color: var(--bg);
  }

  .links { display: flex; flex-direction: column; gap: 4px; }

  .links a {
    color: var(--text);
    text-decoration: underline;
    font-size: 16px;
    transition: color 0.2s;
    cursor: pointer;
    width: fit-content;
  }

  .links a:hover { color: var(--blue); }

  /* БИО: col 2–3, row 1 */
  .bio {
    grid-column: 2 / 4;
    grid-row: 1;
    line-height: 1.65;
    font-size: 16px;
    padding-right: 40px;
    padding-bottom: 32px;
    opacity: 0;
    animation: fadeIn 0.5s ease 0.1s forwards;
  }

  .bio-first { font-style: italic; }

  /* ЗОНА КОРЗИН: col 2-4, row 2 */
  .crates-zone {
    grid-column: 2 / 5;
    grid-row: 2;
    display: flex;
    flex-direction: row;
    align-items: flex-end;
    justify-content: space-between;
    padding: 40px 0 0;
    gap: 24px;
  }

  .crate-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    flex: 1;
  }

  .crate-card.crate-1 { animation-delay: 0.15s; }
  .crate-card.crate-2 { animation-delay: 0.3s; }
  .crate-card.crate-3 { animation-delay: 0.45s; }

  .crate-label {
    font-size: 16px;
    font-weight: 400;
    margin-bottom: 10px;
    text-align: center;
    white-space: nowrap;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.25s ease, transform 0.25s ease;
  }

  .crate-card:hover .crate-label {
    opacity: 1;
    transform: translateY(0);
  }

  .crate-img-wrap { display: inline-block; width: 100%; }

  .crate-img-wrap img {
    width: 100%;
    max-width: 280px;
    height: auto;
    display: block;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.3s ease;
    filter: drop-shadow(0px 24px 32px var(--shadow));
  }

  .crate-card.crate-1:hover .crate-img-wrap img {
    transform: translateY(-14px) rotate(2deg);
    filter: drop-shadow(0px 44px 36px rgba(0,0,0,0.24));
  }

  .crate-card.crate-2:hover .crate-img-wrap img {
    transform: translateY(-14px) rotate(-2deg);
    filter: drop-shadow(0px 44px 36px rgba(0,0,0,0.24));
  }

  .crate-card.crate-3:hover .crate-img-wrap img {
    transform: translateY(-18px) rotate(1.5deg);
    filter: drop-shadow(0px 44px 36px rgba(0,0,0,0.24));
  }

  .crate-shadow {
    width: 160px; height: 18px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.16) 0%, transparent 70%);
    margin-top: -4px;
    transition: opacity 0.3s, transform 0.3s;
  }

  .crate-card:hover .crate-shadow {
    opacity: 0.4;
    transform: scaleX(0.78);
  }

  /* BOTTOM BAR: col 1–4, row 3 */
  .bottom-bar {
    grid-column: 1 / 5;
    grid-row: 3;
    display: flex;
    justify-content: space-between;
    font-size: 16px;
    color: var(--text-muted);
    padding-top: 40px;
    opacity: 0;
    animation: fadeIn 0.6s ease 0.5s forwards;
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }

  /* RESPONSIVE */
  @media (max-width: 1100px) {
    .page { padding: 64px 60px; }
    .crates-zone { gap: 16px; }
    .crate-img-wrap img { max-width: 200px; width: 100%; }
  }

  @media (max-width: 680px) {
    .page {
      padding: 64px 24px;
      display: flex;
      flex-direction: column;
    }

    .profile {
      display: flex; flex-direction: row;
      align-items: flex-start; gap: 20px;
      margin-bottom: 28px;
      animation: none; opacity: 1;
    }

    .avatar { margin-bottom: 0; width: 80px; height: 80px; flex-shrink: 0; }
    .links { align-items: flex-start; }

    .bio { animation: none; opacity: 1; padding-right: 0; padding-bottom: 28px; text-align: left; }

    .crates-zone {
      width: 100%;
      height: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding: 0;
    }

    .crate-card {
      position: static;
      transform: none !important;
      animation: none; opacity: 1;
      flex: none;
      width: auto;
    }

    .crate-label { opacity: 1; transform: none; }
    .crate-img-wrap img { max-width: 280px; width: 80%; }

    .bottom-bar {
      animation: none; opacity: 1;
      padding-top: 32px;
      display: flex;
      justify-content: space-between;
      width: 100%;
    }
  }

  @media (max-width: 400px) {
    .crate-img-wrap img { max-width: 240px; width: 90%; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- col 1, row 1–2: профиль -->
  <div class="profile">
    <div class="avatar">
      <img src="anna.png">
    </div>
    <div class="links">
      <a href="https://instagram.com/the.21.22">instagram</a>
      <a href="https://t.me/the2122">telegram</a>
      <a href="https://www.behance.net/ht26">behance</a>
      <a href="mailto:a.v.bessonova2122@yandex.ru">email</a>
    </div>
  </div>



  <!-- col 2–3, row 1: биотекст -->
  <div class="bio">
    <span class="bio-first">Привет, я Аня — графический дизайнер.</span> Мне нравится делать вещи, которые живут долго, раскрывают идею, выглядят просто и&nbsp;оставляют ощущение, что всё на своём месте.
  </div>

  <!-- зона корзин col 2-4, row 2 -->
  <div class="crates-zone">

    <div class="crate-card crate-1" onclick="location.href='graphic.html'">
      <div class="crate-label">3D&amp;Graphic</div>
      <div class="crate-img-wrap">
        <img src="3.png" alt="3D and Graphic — red crate">
      </div>
      <div class="crate-shadow"></div>
    </div>

    <div class="crate-card crate-2" onclick="location.href='print.html'">
      <div class="crate-label">Print</div>
      <div class="crate-img-wrap">
        <img src="Untitled.png" alt="Print — blue crate">
      </div>
      <div class="crate-shadow"></div>
    </div>

    <div class="crate-card crate-3" onclick="location.href='web.html'">
      <div class="crate-label">Web+Vibecode</div>
      <div class="crate-img-wrap">
        <img src="2.png" alt="Web+Vibecode — dark blue crate">
      </div>
      <div class="crate-shadow"></div>
    </div>

  </div>

  <!-- col 1–4, row 3: bottom bar -->
  <div class="bottom-bar">
    <div>2026 Anna Bessonova</div>
    <div id="clock"></div>
  </div>

</div>

<script>
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('clock').textContent = h + ':' + m + ' ' + (now.getHours() >= 12 ? 'PM' : 'AM');
  }
  updateClock();
  setInterval(updateClock, 10000);
</script>
</body>
</html>
